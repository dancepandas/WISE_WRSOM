  initial_flow: [0, 0, 0, 0, 0, 0, 0, 0, 0]
  tributary_data_path: data/water_divide.xlsx

optimizer:
  population_size: 100
  scheduling_days: 80
  max_iterations_outer: 100
  max_iterations_inner: 100
